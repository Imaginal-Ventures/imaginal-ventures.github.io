  <style>
    :root{
      --ink:#13171c;
      --bone:#f3f2eb;
      --bone-2:#ecebe4;
      --cell:#c8504c;
      --slate:#5b6370;
      --mute:#9aa0a6;
      --rule:#d8d6cc;
      --rule-soft:#e2e0d6;
      --ff-display:"Cormorant Garamond",serif;
      --ff-body:"Newsreader",serif;
      --ff-mono:"IBM Plex Mono",monospace;
    }
    *{box-sizing:border-box}
    html,body{margin:0;padding:0;background:#ecebe4;color:var(--ink);font-family:var(--ff-body);scroll-behavior:smooth}

    /* ============================================================
       RESPONSIVE — two breakpoints used throughout:
       900px = tablet + mobile (fixes hard overflow from fixed widths)
       700px = mobile only (deliberate layout/stacking changes)
       ============================================================ */

    /* Proof-numbers stat row: 4-across on desktop, 2x2 on tablet/mobile.
       minmax(0,1fr), not plain 1fr, so columns actually shrink to fit —
       otherwise Grid's default auto-minimum lets long numbers overflow. */
    @media (max-width: 900px){
      .proof-grid{ grid-template-columns: repeat(2, minmax(0, 1fr)) !important; }
      .proof-item{ border-right: 1px solid var(--rule) !important; border-bottom: 1px solid var(--rule-soft); padding: 16px !important; }
      .proof-item:nth-child(2n){ border-right: none !important; }
      .proof-item:nth-child(n+3){ border-bottom: none; }
    }
    @media (max-width: 420px){
      .proof-num{ font-size: 40px !important; }
    }

    /* Problems Worth Solving: 3-across on desktop, stacked on tablet/mobile
       (fixed card/link widths overflow the column below ~1100px) */
    @media (max-width: 900px){
      .problems-grid{ grid-template-columns: 1fr !important; }
      .problems-item{ width: 100% !important; }
      .problems-meet{ width: 100% !important; }
    }

    /* Nav bar: full link row on desktop/tablet, sticky hamburger + full-bleed
       dropdown on mobile (the nav row overflows below ~700px) */
    .nav-toggle{ display: none; }
    @media (max-width: 700px){
      .nav-sticky-wrap{ position: sticky; top: 0; z-index: 30; background: var(--bone); }
      .nav-toggle{ display: flex !important; }
      .nav-links{ display: none !important; }
      .nav-links.open{
        display: flex !important;
        flex-direction: column !important;
        align-items: flex-start !important;
        gap: 2px !important;
        position: absolute;
        left: 0;
        right: 0;
        top: 100%;
        padding: 8px 24px 20px;
        z-index: 20;
        border-bottom: 1px solid var(--rule);
        background: var(--bone);
      }
      .nav-links.open a{ width: 100%; margin: 6px 0; white-space: normal !important; }
    }

    /* Hero: copy panel stacks above the dark graphic panel on mobile */
    @media (max-width: 700px){
      .hero-grid{ grid-template-columns: 1fr !important; }
      .hero-copy{ order: 1; padding: 48px 24px !important; }
      .hero-dark{ order: 2; padding: 48px 24px !important; }
      .hero-h1{ font-size: 44px !important; }
      .hero-break{ display: none; }
      .hero-caption{ flex-direction: column !important; align-items: flex-start !important; gap: 6px; }
    }

    /* Philosophy: pull-quote + body copy stack on mobile */
    @media (max-width: 700px){
      .philosophy-grid{ grid-template-columns: 1fr !important; gap: 40px !important; }
    }

    /* Three Imaginal Values: stack on mobile */
    @media (max-width: 700px){
      .values-grid{ grid-template-columns: 1fr !important; }
      .values-item{ border-left: none !important; border-top: 1px solid var(--rule) !important; }
    }

    /* Team: Erin / Dorothy stack on mobile */
    @media (max-width: 700px){
      .team-grid{ grid-template-columns: 1fr !important; gap: 40px !important; }
    }

    /* Trust Pulse card: button sits inline with text on desktop/tablet,
       drops beneath the text on mobile only */
    @media (max-width: 600px){
      .trust-card{ grid-template-columns: 1fr !important; }
      .trust-cta{ margin-top: 24px; justify-self: start; white-space: normal !important; text-align: center; }
    }

    /* CTA: button drops below the heading on mobile */
    @media (max-width: 700px){
      .cta-grid{ grid-template-columns: 1fr !important; }
      .cta-h3{ font-size: 34px !important; margin-top: 12px !important; }
      .cta-btn-wrap{ text-align: left !important; margin-top: 20px; }
    }

    /* Footer: Practice / Correspondence columns stack on mobile */
    @media (max-width: 700px){
      .footer-grid{ grid-template-columns: 1fr !important; gap: 32px !important; }
    }

    /* Section headers (§ index / label / tag) are used on every section —
       the fixed 80px/1fr/140px columns overflow once the middle column
       drops below ~150px, so wrap the tag onto its own line on mobile */
    @media (max-width: 700px){
      .section-head{ display: flex !important; flex-wrap: wrap !important; gap: 6px 16px !important; }
      .section-head-tag{ flex-basis: 100%; text-align: left !important; width: auto !important; }
    }

    /* Offering/Programs cards: stack on mobile */
    @media (max-width: 700px){
      .programs-grid{ grid-template-columns: 1fr !important; }
    }

    /* Testimonials: stack on mobile */
    @media (max-width: 700px){
      .testimonials-grid{ grid-template-columns: 1fr !important; gap: 40px !important; }
    }

    /* Field Notes cards: stack on mobile */
    @media (max-width: 700px){
      .notes-grid{ grid-template-columns: 1fr !important; gap: 28px !important; }
    }

    /* Full-bleed band image caption: two long labels don't fit side by side */
    @media (max-width: 700px){
      .band-caption{ flex-direction: column !important; gap: 4px; padding: 12px 24px 0 !important; }
    }

    /* Nav toggle button's negative margin nudges the row a few px wide */
    @media (max-width: 700px){
      .nav-toggle{ margin: 0 !important; }
    }
